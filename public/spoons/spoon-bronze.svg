<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0C090"/>
      <stop offset="40%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#7B4010"/>
    </linearGradient>
    <linearGradient id="bsh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Bowl -->
  <ellipse cx="32" cy="34" rx="24" ry="30" fill="url(#bg)"/>
  <!-- Bowl inner highlight -->
  <ellipse cx="26" cy="22" rx="10" ry="14" fill="url(#bsh)"/>
  <!-- Neck -->
  <path d="M24,58 C22,70 24,80 29,84 L35,84 C40,80 42,70 40,58 Z" fill="url(#bg)"/>
  <!-- Handle -->
  <path d="M29,84 L27,150 Q32,156 37,150 L35,84 Z" fill="url(#bg)"/>
  <!-- Handle highlight -->
  <path d="M30,88 L29,145" stroke="white" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Patina spots -->
  <circle cx="38" cy="28" r="3" fill="#5A9060" opacity="0.2"/>
  <circle cx="22" cy="44" r="2" fill="#5A9060" opacity="0.15"/>
</svg>
