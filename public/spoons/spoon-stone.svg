<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 160">
  <defs>
    <linearGradient id="stg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="50%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="stsh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Bowl — slightly irregular for "stone" feel -->
  <ellipse cx="32" cy="35" rx="23" ry="29" fill="url(#stg)"/>
  <!-- Rough texture lines -->
  <path d="M20,28 Q28,22 38,30" stroke="#6B7280" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M18,40 Q30,34 44,42" stroke="#6B7280" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Bowl inner highlight -->
  <ellipse cx="26" cy="24" rx="9" ry="12" fill="url(#stsh)"/>
  <!-- Neck -->
  <path d="M25,58 C23,70 25,80 30,84 L34,84 C39,80 41,70 39,58 Z" fill="url(#stg)"/>
  <!-- Handle — slightly rough -->
  <path d="M30,84 L28,149 Q32,155 36,149 L34,84 Z" fill="url(#stg)"/>
  <!-- Chip marks on handle -->
  <path d="M30,100 L29,103" stroke="#4B5563" stroke-width="1.5" opacity="0.5"/>
  <path d="M33,120 L34,124" stroke="#4B5563" stroke-width="1.5" opacity="0.4"/>
</svg>
